services:
  postgres:
    image: postgres:16-alpine
    container_name: nexara-postgres
    environment:
      POSTGRES_USER: nexara
      POSTGRES_PASSWORD: nexara
      POSTGRES_DB: nexara_crm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexara -d nexara_crm"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexara-api
    ports:
      - "5278:5278"
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://0.0.0.0:5278
      Seed__RunDemoOnStartup: "true"
      Storage__RootPath: /app/data/cloud
      Integrations__Google__ClientId: ${GOOGLE_OAUTH_CLIENT_ID:-}
      Integrations__Google__ClientSecret: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    volumes:
      - cloud_data:/app/data/cloud
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:5278/health"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 25s

  seed:
    image: node:22-alpine
    container_name: nexara-seed
    restart: "no"
    working_dir: /seed
    volumes:
      - ./frontend/scripts/seed-demo.js:/seed/seed-demo.js:ro
    environment:
      API_BASE_URL: http://api:5278
      SEED_USERNAME: admin
      SEED_PASSWORD: "123456"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        echo "Waiting for API at $$API_BASE_URL..."
        until node -e "fetch(process.env.API_BASE_URL+'/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"; do sleep 2; done
        echo "Running demo seed..."
        node /seed/seed-demo.js
        echo "Demo seed finished."
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  cloud_data:
