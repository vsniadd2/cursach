services:
  postgres:
    image: postgres:16-alpine
    container_name: nexara-postgres
    environment:
      POSTGRES_USER: nexara
      POSTGRES_PASSWORD: nexara
      POSTGRES_DB: nexara_crm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexara -d nexara_crm"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexara-api
    ports:
      - "5278:5278"
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://0.0.0.0:5278
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
